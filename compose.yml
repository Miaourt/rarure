services:
  caddy:
    container_name: mastodon-caddy
    build:
      context: ./src/caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    network_mode: "host"
    volumes:
      - ../persistent-data/caddy/data:/data
      - ../persistent-data/caddy/config:/config

  cdn:
    container_name: mastodon-cdn
    build:
      context: ./src/picocache
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file: env.production
    ports:
      - '127.0.0.1:6000:8080'
    networks:
      - external_network
    healthcheck:
      test: ['CMD-SHELL', 'wget -SO- http://localhost:8080/ 2>&1 | grep -q "HTTP/"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ../persistent-data/mastodon/cdn:/var/cache/cdncache

  redis:
    container_name: mastodon-redis
    restart: unless-stopped
    image: redis:7-alpine
    security_opt:
      - no-new-privileges:true
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - ../persistent-data/mastodon/redis:/data

  web:
    container_name: mastodon-web
    restart: unless-stopped
    build:
      context: ./src/mastodon-r3
      dockerfile: ./Dockerfile
    security_opt:
      - no-new-privileges:true
    env_file: env.production
    command: bundle exec puma -C config/puma.rb
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ['CMD-SHELL', "curl -sf --noproxy localhost localhost:3000/health | grep -q 'OK' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../persistent-data/mastodon/emojis:/emojis

  sidekiq:
    container_name: mastodon-sidekiq
    restart: unless-stopped
    build:
      context: ./src/mastodon-r3
      dockerfile: ./Dockerfile
    security_opt:
      - no-new-privileges:true
    env_file: env.production
    command: bundle exec sidekiq -c 20
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ['CMD-SHELL', "ps aux | grep '[s]idekiq' | grep -v grep || false"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  streaming:
    container_name: mastodon-streaming
    restart: unless-stopped
    build:
      context: ./src/mastodon-r3
      dockerfile: ./streaming/Dockerfile
    security_opt:
      - no-new-privileges:true
    env_file: env.production
    command: node ./streaming/index.js
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ['CMD-SHELL', "curl -sf --noproxy localhost localhost:4000/api/v1/streaming/health | grep -q 'OK' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - '127.0.0.1:4000:4000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    container_name: mastodon-db
    restart: unless-stopped
    image: postgres:16-alpine
    security_opt:
      - no-new-privileges:true
    environment:
      - 'PGDATA=/var/lib/postgresql/data/pgdata'
    env_file: env.production
    shm_size: 256mb
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'mastodon', '-d', 'mastodon']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ../persistent-data/mastodon/postgres:/var/lib/postgresql/data/pgdata
      - ../persistent-data/mastodon/postgres-srv:/srv

networks:
  external_network:
  internal_network:
    internal: true

## Some useful commands
## First setup
# docker compose run --rm -e RAILS_ENV=production web rails db:setup
#
# docker compose run --rm web tootctl accounts modify Miaourt --role admin
#
## Backup Database
# docker compose exec postgres pg_dump -Fc -U mastodon mastodon -f /srv/dump.sql
#
## Restore Database
# pg_restore -v -U mastodon -d mastodon -Fc /srv/dump.sql
#
## Migrate Database
# docker compose run --rm -e SKIP_POST_DEPLOYMENT_MIGRATIONS=true web bundle exec rails db:migrate
# docker compose run --rm web bundle exec rails db:migrate
#
## Grab all users emails if u need to send an important message
# docker compose run web rails r "puts *User.confirmed.pluck(:email)"
#
## Emojis
# tootctl emoji import /emojis/Meowmoji.tar.gz --category Meowmojis
#
## Prune cached media
# docker compose exec -e RAILS_ENV=production web tootctl media remove -c 10
#
## Prune cached thumbnails
# docker compose exec -e RAILS_ENV=production web tootctl preview_cards remove --days 15 --verbose
#
## Remove orphaned media
# docker compose exec -e RAILS_ENV=production web tootctl media remove-orphans --verbose
